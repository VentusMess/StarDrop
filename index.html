<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainrot Star Drop</title>
    <style>
      :root {
        color-scheme: dark;
        --bg1: #1e1b4b;
        --bg2: #0f172a;
        --bg3: #030712;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #fff;
        background: radial-gradient(circle at 15% 15%, #7c3aed 0%, var(--bg1) 30%, var(--bg2) 62%, var(--bg3) 100%);
      }

      .app {
        width: min(1120px, 100% - 32px);
        margin: 20px auto 28px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .brand {
        font-size: clamp(28px, 5vw, 44px);
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      .stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        padding: 10px 14px;
        border-radius: 12px;
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 1.1fr;
        gap: 14px;
      }

      .panel {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        border-radius: 16px;
        padding: 16px;
      }

      .panel-title {
        font-size: 20px;
        font-weight: 800;
        margin: 0 0 12px;
      }

      .buy {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px;
        font-size: 18px;
        font-weight: 900;
        color: #111827;
        cursor: pointer;
        background: linear-gradient(90deg, #facc15, #fb7185, #38bdf8);
        transition: transform 0.2s ease, filter 0.2s ease;
      }

      .buy:hover {
        transform: translateY(-1px) scale(1.01);
        filter: saturate(1.2);
      }

      .buy:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .hint {
        margin-top: 10px;
        text-align: center;
        opacity: 0.84;
        font-weight: 600;
      }

      .base-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .slot {
        border-radius: 12px;
        padding: 10px;
        min-height: 112px;
        border: 1px dashed rgba(255, 255, 255, 0.28);
        background: rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .slot.filled {
        border-style: solid;
        border-color: rgba(255, 255, 255, 0.4);
        background: rgba(0, 0, 0, 0.32);
      }

      .unit {
        font-weight: 700;
      }

      .rps {
        color: #a3e635;
        font-weight: 700;
      }

      .sell {
        margin-top: 8px;
        border: 0;
        border-radius: 8px;
        padding: 6px 8px;
        font-weight: 700;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(90deg, #fb7185, #ec4899);
      }

      .empty {
        opacity: 0.55;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        place-items: center;
        background: radial-gradient(circle at 50% 32%, #312e81 0%, #0f172a 45%, #020617 100%);
      }

      .overlay.show {
        display: grid;
      }

      .open-wrap {
        text-align: center;
        width: min(780px, 100% - 24px);
      }

      .rarity {
        margin: 0 0 10px;
        font-size: clamp(32px, 6vw, 56px);
        font-weight: 900;
      }

      .star-btn {
        border: 0;
        background: none;
        cursor: pointer;
        width: clamp(190px, 30vw, 300px);
        aspect-ratio: 1;
        position: relative;
      }

      .star-aura {
        position: absolute;
        inset: 12%;
        border-radius: 999px;
        filter: blur(20px);
        animation: pulse 1.4s ease-in-out infinite;
      }

      .star-svg {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
        transform-origin: center;
      }

      .hit {
        animation: hit 0.24s ease-out;
      }

      .crack {
        animation: crack 0.82s ease-in forwards;
      }

      .core {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 52px;
        height: 52px;
        margin-left: -26px;
        margin-top: -26px;
        background: #fff;
        border-radius: 999px;
        opacity: 0;
      }

      .core.flash {
        animation: flash 0.82s ease-out;
      }

      .ray {
        position: absolute;
        left: 50%;
        top: 50%;
        background: rgba(255, 255, 255, 0.94);
        border-radius: 99px;
        opacity: 0;
      }

      .ray.x {
        width: 170px;
        height: 4px;
        margin-left: -85px;
        margin-top: -2px;
      }

      .ray.y {
        width: 4px;
        height: 170px;
        margin-left: -2px;
        margin-top: -85px;
      }

      .ray.show.x {
        animation: rayX 0.82s ease-out;
      }

      .ray.show.y {
        animation: rayY 0.82s ease-out;
      }

      .progress {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 800;
      }

      .reward {
        margin: 20px auto 0;
        width: min(600px, 100%);
        padding: 18px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.38);
        background: rgba(0, 0, 0, 0.38);
        animation: rewardIn 0.36s ease-out;
      }

      .reward-main {
        font-size: clamp(28px, 5vw, 42px);
        font-weight: 900;
        margin: 4px 0 12px;
      }

      .take {
        border: 0;
        border-radius: 10px;
        padding: 10px 18px;
        font-weight: 900;
        color: #111827;
        cursor: pointer;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(0.95); opacity: 0.45; }
        50% { transform: scale(1.08); opacity: 0.9; }
      }

      @keyframes hit {
        0% { transform: scale(0.86) rotate(-10deg); }
        55% { transform: scale(1.12) rotate(7deg); }
        100% { transform: scale(1) rotate(0deg); }
      }

      @keyframes crack {
        0% { transform: scale(1); opacity: 1; }
        34% { transform: scale(1.26) rotate(16deg); opacity: 1; }
        100% { transform: scale(0.06) rotate(-22deg); opacity: 0; }
      }

      @keyframes flash {
        0% { transform: scale(0.2); opacity: 0; }
        34% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(2.3); opacity: 0; }
      }

      @keyframes rayX {
        0% { transform: scaleX(0.1); opacity: 0; }
        34% { transform: scaleX(1.25); opacity: 1; }
        100% { transform: scaleX(1.85); opacity: 0; }
      }

      @keyframes rayY {
        0% { transform: scaleY(0.1); opacity: 0; }
        34% { transform: scaleY(1.25); opacity: 1; }
        100% { transform: scaleY(1.85); opacity: 0; }
      }

      @keyframes rewardIn {
        0% { transform: translateY(16px) scale(0.94); opacity: 0; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }

      @media (max-width: 880px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="top">
        <div class="brand">BRAINROT STAR DROP</div>
        <div class="stats">
          <div class="chip" id="moneyView">0₽</div>
          <div class="chip" id="incomeView">0₽/сек</div>
        </div>
      </div>

      <div class="layout">
        <section class="panel">
          <h2 class="panel-title">Открытие</h2>
          <button id="buyBtn" class="buy">Открыть бесплатно</button>
          <div class="hint" id="priceHint">Следующая цена: 0₽</div>
        </section>

        <section class="panel">
          <h2 class="panel-title">База 8 слотов</h2>
          <div class="base-grid" id="baseGrid"></div>
        </section>
      </div>
    </div>

    <div class="overlay" id="overlay">
      <div class="open-wrap">
        <h2 class="rarity" id="rarityTitle">Редкий</h2>

        <button class="star-btn" id="starBtn" aria-label="Клик по звезде">
          <span class="star-aura" id="starAura"></span>
          <span class="core" id="core"></span>
          <span class="ray x" id="rayX"></span>
          <span class="ray y" id="rayY"></span>
          <svg class="star-svg" id="starSvg" viewBox="0 0 100 100">
            <polygon points="50,4 62,34 95,36 69,57 77,92 50,72 23,92 31,57 5,36 38,34" />
          </svg>
        </button>

        <div class="progress" id="progressView">0/3</div>

        <div class="reward" id="rewardBox" style="display: none">
          <div id="rewardType"></div>
          <div class="reward-main" id="rewardMain"></div>
          <button class="take" id="takeBtn">Забрать</button>
        </div>
      </div>
    </div>

    <script>
      const BASE_SIZE = 8;
      const STORE_KEY = "brainrot-star-drop-v1";

      const rarityView = {
        rare: { title: "Редкий", color: "#bef264", glow: "rgba(132, 204, 22, 0.95)", grad: "linear-gradient(90deg,#a3e635,#34d399)" },
        super: { title: "Сверхредкий", color: "#67e8f9", glow: "rgba(34, 211, 238, 0.95)", grad: "linear-gradient(90deg,#22d3ee,#3b82f6)" },
        epic: { title: "Эпический", color: "#f0abfc", glow: "rgba(232, 121, 249, 0.95)", grad: "linear-gradient(90deg,#e879f9,#8b5cf6)" },
        mythic: { title: "Мифический", color: "#fda4af", glow: "rgba(251, 113, 133, 0.95)", grad: "linear-gradient(90deg,#fb7185,#ef4444)" },
      };

      const dropTable = {
        rare: [
          { weight: 60, reward: { kind: "unit", name: "Nobini Pizzanini", rps: 2 } },
          { weight: 20, reward: { kind: "money", amount: 75 } },
          { weight: 20, reward: { kind: "unit", name: "Bananita Dolphinito", rps: 4 } },
        ],
        super: [
          { weight: 50, reward: { kind: "unit", name: "Avocadini Guffo", rps: 7 } },
          { weight: 40, reward: { kind: "money", amount: 120 } },
          { weight: 10, reward: { kind: "unit", name: "Burbaloni Lolilori", rps: 12 } },
        ],
        epic: [
          { weight: 50, reward: { kind: "unit", name: "Ballerina Capuchina", rps: 20 } },
          { weight: 35, reward: { kind: "money", amount: 275 } },
          { weight: 15, reward: { kind: "unit", name: "Te Te Sahur", rps: 32 } },
        ],
        mythic: [
          { weight: 50, reward: { kind: "unit", name: "Odin din dun", rps: 40 } },
          { weight: 30, reward: { kind: "money", amount: 340 } },
          { weight: 20, reward: { kind: "unit", name: "Tralelelo Tralala", rps: 55 } },
        ],
      };

      const state = {
        money: 0,
        purchases: 0,
        nextUnitId: 1,
        baseSlots: Array.from({ length: BASE_SIZE }, () => null),
        opening: null,
        reward: null,
        pendingReward: null,
        bursting: false,
      };

      const el = {
        moneyView: document.getElementById("moneyView"),
        incomeView: document.getElementById("incomeView"),
        buyBtn: document.getElementById("buyBtn"),
        priceHint: document.getElementById("priceHint"),
        baseGrid: document.getElementById("baseGrid"),
        overlay: document.getElementById("overlay"),
        rarityTitle: document.getElementById("rarityTitle"),
        starBtn: document.getElementById("starBtn"),
        starSvg: document.getElementById("starSvg"),
        starAura: document.getElementById("starAura"),
        core: document.getElementById("core"),
        rayX: document.getElementById("rayX"),
        rayY: document.getElementById("rayY"),
        progressView: document.getElementById("progressView"),
        rewardBox: document.getElementById("rewardBox"),
        rewardType: document.getElementById("rewardType"),
        rewardMain: document.getElementById("rewardMain"),
        takeBtn: document.getElementById("takeBtn"),
      };

      function getDropPrice(purchases) {
        if (purchases === 0) return 0;
        return Math.ceil(40 * Math.pow(1.5, purchases - 1));
      }

      function sellPriceFor(rps) {
        return rps * 25;
      }

      function incomePerSecond() {
        return state.baseSlots.reduce((sum, slot) => sum + (slot ? slot.rps : 0), 0);
      }

      function pickWeighted(items) {
        const total = items.reduce((sum, item) => sum + item.weight, 0);
        let roll = Math.random() * total;
        for (const item of items) {
          roll -= item.weight;
          if (roll <= 0) return item.reward;
        }
        return items[items.length - 1].reward;
      }

      function rollRarity(current, click) {
        if (click === 1) return Math.random() < 0.7 ? "rare" : "super";
        if (click === 2) {
          if (current === "rare") return Math.random() < 0.6 ? "rare" : "super";
          if (current === "super") return Math.random() < 0.1 ? "epic" : "super";
          return current;
        }
        if (current === "rare") return Math.random() < 0.6 ? "rare" : "super";
        if (current === "super") return Math.random() < 0.1 ? "epic" : "super";
        if (current === "epic") return Math.random() < 0.1 ? "mythic" : "epic";
        return "mythic";
      }

      function saveState() {
        const payload = {
          money: state.money,
          purchases: state.purchases,
          nextUnitId: state.nextUnitId,
          baseSlots: state.baseSlots,
        };
        localStorage.setItem(STORE_KEY, JSON.stringify(payload));
      }

      function loadState() {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return;
        try {
          const parsed = JSON.parse(raw);
          state.money = Number.isFinite(parsed.money) ? parsed.money : 0;
          state.purchases = Number.isFinite(parsed.purchases) ? parsed.purchases : 0;
          state.nextUnitId = Number.isFinite(parsed.nextUnitId) ? parsed.nextUnitId : 1;
          if (Array.isArray(parsed.baseSlots) && parsed.baseSlots.length === BASE_SIZE) {
            state.baseSlots = parsed.baseSlots.map((slot) => {
              if (!slot) return null;
              if (typeof slot.id !== "number" || typeof slot.name !== "string" || typeof slot.rps !== "number") return null;
              return {
                id: slot.id,
                name: slot.name,
                rps: slot.rps,
                sellPrice: typeof slot.sellPrice === "number" ? slot.sellPrice : sellPriceFor(slot.rps),
                rarity: ["rare", "super", "epic", "mythic"].includes(slot.rarity) ? slot.rarity : "rare",
              };
            });
          }
        } catch {
          localStorage.removeItem(STORE_KEY);
        }
      }

      function renderBase() {
        el.baseGrid.innerHTML = "";
        state.baseSlots.forEach((slot, i) => {
          const box = document.createElement("div");
          box.className = slot ? "slot filled" : "slot";
          if (!slot) {
            box.innerHTML = `<div class="empty">Слот ${i + 1}</div>`;
            el.baseGrid.appendChild(box);
            return;
          }
          box.innerHTML = `
            <div class="unit">${slot.name}</div>
            <div class="rps">${slot.rps}₽/сек</div>
            <div>Продажа ${slot.sellPrice}₽</div>
          `;
          const btn = document.createElement("button");
          btn.className = "sell";
          btn.textContent = "Удалить и продать";
          btn.addEventListener("click", () => {
            state.money += slot.sellPrice;
            state.baseSlots[i] = null;
            saveState();
            render();
          });
          box.appendChild(btn);
          el.baseGrid.appendChild(box);
        });
      }

      function updateStarStyle(rarity) {
        const view = rarityView[rarity];
        el.rarityTitle.textContent = view.title;
        el.rarityTitle.style.color = view.color;
        el.starAura.style.background = view.glow;
        el.starSvg.style.fill = view.color;
        el.starSvg.style.filter = `drop-shadow(0 0 22px ${view.glow})`;
      }

      function renderReward() {
        if (!state.reward) {
          el.rewardBox.style.display = "none";
          return;
        }
        const view = rarityView[state.reward.rarity];
        el.rewardType.textContent = view.title;
        el.rewardType.style.color = view.color;
        el.takeBtn.style.background = view.grad;
        if (state.reward.kind === "money") {
          el.rewardMain.textContent = `+${state.reward.amount}₽`;
        } else {
          el.rewardMain.textContent = `${state.reward.name}  +${state.reward.rps}₽/сек`;
        }
        el.rewardBox.style.display = "block";
      }

      function render() {
        const price = getDropPrice(state.purchases);
        const income = incomePerSecond();

        el.moneyView.textContent = `${state.money}₽`;
        el.incomeView.textContent = `${income}₽/сек`;
        el.priceHint.textContent = `Следующая цена: ${price}₽`;
        el.buyBtn.textContent = price === 0 ? "Открыть бесплатно" : `Купить за ${price}₽`;
        el.buyBtn.disabled = !!state.opening || !!state.reward || !!state.pendingReward || state.bursting || state.money < price;

        renderBase();

        if (state.opening) {
          el.overlay.classList.add("show");
          el.progressView.textContent = `${state.opening.click}/3`;
          updateStarStyle(state.opening.rarity);
        } else {
          el.overlay.classList.remove("show");
        }

        renderReward();
      }

      function startDrop() {
        const price = getDropPrice(state.purchases);
        if (state.opening || state.reward || state.pendingReward || state.bursting) return;
        if (state.money < price) return;
        state.money -= price;
        state.purchases += 1;
        state.opening = { click: 0, rarity: "rare" };
        state.reward = null;
        state.pendingReward = null;
        state.bursting = false;
        saveState();
        render();
      }

      function clickStar() {
        if (!state.opening || state.reward || state.pendingReward || state.bursting) return;

        el.starSvg.classList.remove("hit");
        void el.starSvg.offsetWidth;
        el.starSvg.classList.add("hit");

        const nextClick = state.opening.click + 1;
        const nextRarity = rollRarity(state.opening.rarity, nextClick);

        if (nextClick < 3) {
          state.opening = { click: nextClick, rarity: nextRarity };
          render();
          return;
        }

        const picked = pickWeighted(dropTable[nextRarity]);
        state.pendingReward = { ...picked, rarity: nextRarity };
        state.opening = { click: nextClick, rarity: nextRarity };
        state.bursting = true;

        el.starSvg.classList.remove("hit");
        el.starSvg.classList.add("crack");
        el.core.classList.add("flash");
        el.rayX.classList.add("show");
        el.rayY.classList.add("show");

        setTimeout(() => {
          state.bursting = false;
          state.reward = state.pendingReward;
          state.pendingReward = null;
          el.starSvg.classList.remove("crack");
          el.core.classList.remove("flash");
          el.rayX.classList.remove("show");
          el.rayY.classList.remove("show");
          render();
        }, 920);

        render();
      }

      function claimReward() {
        if (!state.reward) return;
        if (state.reward.kind === "money") {
          state.money += state.reward.amount;
        } else {
          const idx = state.baseSlots.findIndex((s) => s === null);
        findIndex((s) => s === null);
          if (idx === -1) {
            state.money += sellPriceFor(state.reward.rps);
          } else {
            state.baseSlots[idx] = {
              id: state.nextUnitId++,
              name: state.reward.name,
              rps: state.reward.rps,
              sellPrice: sellPriceFor(state.reward.rps),
              rarity: state.reward.rarity,
            };
          }
        }
        state.reward = null;
        state.pendingReward = null;
        state.opening = null;
        saveState();
        render();
      }

      loadState();
      render();

      el.buyBtn.addEventListener("click", startDrop);
      el.starBtn.addEventListener("click", clickStar);
      el.takeBtn.addEventListener("click", claimReward);

      setInterval(() => {
        const inc = incomePerSecond();
        if (inc <= 0) return;
        state.money += inc;
        saveState();
        render();
      }, 1000);
    </script>
  </body>
</html>
